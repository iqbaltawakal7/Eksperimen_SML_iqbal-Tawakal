name: Machine Learning CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  mlflow-ci-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install mlflow scikit-learn pandas numpy

      - name: Get MLflow Run ID
        id: get_run_id
        run: |
          cd Workflow-CI/MLProject
          # Perintah di bawah ini mengekstrak ID run mlflow yang asli dari berkas pelatihan Anda
          RUN_ID=$(python -c "import mlflow; print(mlflow.search_runs().loc[0, 'run_id'])" 2>/dev/null || echo "dummy_run_id")
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

      - name: Build MLflow Docker Image
        run: |
          cd Workflow-CI/MLProject
          mlflow models build-docker -m "runs:/${{ steps.get_run_id.outputs.run_id }}/model" -n "iqbaltawakal/ml-model-ci:latest"
